get_polar_eff.py:
  surveys_to_calib:  
    - lat_iso
  ref_map_set_lat_iso_i1_f090: "dr6_pa5_f090"
  ref_map_set_lat_iso_i1_f150: "dr6_pa5_f150"
  ell_range_cal_lat_iso_i1_f090: [600, 1200]
  ell_range_cal_lat_iso_i1_f150: [600, 1200]

compute_tf.py:
  surveys_to_calib:
    - lat_iso

  ref_map_sets:
    lat_iso_i1_f090: "planck_f100"
    lat_iso_i1_f150: "planck_f143"

  subtract_bf_fg: False
  montecarlo_errors: False

compute_null_tests.py:
  pte_threshold: 0.01
  remove_first_bin: True

  skip_pa4_pol: True
  skip_diff_freq_TT: True
  skip_EB: False
  fudge: False

  multipole_range:
    lat_iso_i1_f090:
      T: [200, 7000]
      E: [200, 7000]
      B: [200, 7000]
    lat_iso_i1_f150:
      T: [200, 7000]
      E: [200, 7000]
      B: [200, 7000]

  l_pows:
    TT: 1
    TE: 0
    TB: 0
    ET: 0
    BT: 0
    EE: -1
    EB: -1
    BE: -1
    BB: -1

  y_lims:
    TT: [-100000, 75000]
    TE: [-30, 30]
    TB: [-30, 30]
    ET: [-30, 30]
    BT: [-30, 30]
    EE: [-0.01, 0.01]
    EB: [-0.01, 0.01]
    BE: [-0.01, 0.01]
    BB: [-0.01, 0.01]

