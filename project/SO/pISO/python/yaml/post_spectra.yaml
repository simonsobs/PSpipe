      T: [200, 7000]
      E: [200, 7000]
      B: [200, 7000]
    SO_i1_f150:
      T: [200, 7000]
      E: [200, 7000]
      B: [200, 7000]

  l_pows:
    TT: 1
    TE: 0
    TB: 0
    ET: 0
    BT: 0
    EE: -1
    EB: -1
    BE: -1
    BB: -1

  y_lims:
    TT: [-100000, 75000]
    TE: [-30, 30]
    TB: [-30, 30]
    ET: [-30, 30]
    BT: [-30, 30]
    EE: [-0.01, 0.01]
    EB: [-0.01, 0.01]
    BE: [-0.01, 0.01]
    BB: [-0.01, 0.01]
